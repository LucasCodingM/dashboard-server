services:
  dashboard:
    build: .
    container_name: dashboard-server
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - IS_DOCKER=true
      - DECLIN_DISCORD_PATH=/declin-discord
      - DECLIN_WEB_PATH=/declin-web
    volumes:
      # Docker daemon host (contrôle des services)
      - /var/run/docker.sock:/var/run/docker.sock
      # Sources des projets pour docker compose
      - ../declin-discord:/declin-discord
      - ../declin-web:/declin-web
      # Disques de stockage physiques (rw pour les téléchargements)
      - /stockage:/stockage
    privileged: true
    user: root
